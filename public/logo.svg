      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.95 0 1 0 0 0.68 0 0 1 0 0.18 0 0 0 0.5 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

