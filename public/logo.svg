<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" role="img" aria-labelledby="title desc">
  <title id="title">enbilir.com logo</title>
  <desc id="desc">Black and gold finance competition logo with a crown, trophy and rising chart icon.</desc>
  <defs>
    <linearGradient id="gold" x1="160" y1="76" x2="560" y2="604" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff2a8"/>
      <stop offset="0.34" stop-color="#f5c84b"/>
      <stop offset="0.68" stop-color="#b77a12"/>
      <stop offset="1" stop-color="#ffe08a"/>
